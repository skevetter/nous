[workspace]
members = [
    "crates/nous-shared",
    "crates/nous-core",
    "crates/nous-mcp",
    "crates/nous-otlp",
    "tests/correlation",
    "tests/e2e",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.88"

[workspace.dependencies]
# MCP protocol
rmcp = { version = "1.5", features = ["server", "macros", "schemars", "transport-io", "transport-streamable-http-server"] }

# SQLite + extensions (SQLCipher for encryption at rest)
rusqlite = { version = "0.39", features = ["bundled-sqlcipher"] }
sqlite-vec = "0.1.10-alpha.3"

# Embeddings (direct ort pipeline, Magika-style architecture)
ort = "2.0.0-rc.12"
tokenizers = { version = "0.22", features = ["http"] }
hf-hub = "0.5"
ndarray = "0.17"

# HTTP + async
axum = "0.8"
tokio = { version = "1", features = ["full"] }

# OTLP decoding (nous-otlp only)
prost = "0.13"
opentelemetry-proto = { version = "0.27", features = ["gen-tonic-messages"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# CLI
clap = { version = "4", features = ["derive"] }

# Error handling
thiserror = "2"
anyhow = "1"

# IDs
uuid = { version = "1", features = ["v7"] }

# Testing
reqwest = { version = "0.12", features = ["rustls-tls"], default-features = false }
tempfile = "3"

