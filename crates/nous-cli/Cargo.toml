[package]
name = "nous-cli"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[lib]
name = "nous_cli"
path = "src/lib.rs"

[[bin]]
name = "nous"
path = "src/main.rs"

[dependencies]
nous-core = { path = "../nous-core" }
nous-otlp = { path = "../nous-otlp" }
nous-shared = { path = "../nous-shared" }
rmcp = { workspace = true }
rusqlite = { workspace = true }
clap = { workspace = true }
csv = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
axum = { workspace = true }
bytes = "1"
http-body-util = "0.1"
hyper = "1"
hyper-util = { version = "0.1", features = ["tokio"] }
uuid = { workspace = true }
libc = "0.2"
reqwest = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
rmcp = { workspace = true, features = ["client"] }
tower = "0.5"
